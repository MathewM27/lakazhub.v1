    <circle cx="300" cy="300" r="250" fill="#f3f4f6" opacity="0.1"/>
    <circle cx="300" cy="300" r="200" fill="#e5e7eb" opacity="0.1"/>
    
    <!-- House Base -->
    <path d="M150 350h300v150H150V350z" fill="#4B5563"/>
    
    <!-- Roof -->
    <path d="M100 350L300 200L500 350H100z" fill="#6B7280"/>
    
    <!-- Windows -->
    <rect x="200" y="400" width="60" height="60" fill="#E5E7EB"/>
    <rect x="340" y="400" width="60" height="60" fill="#E5E7EB"/>
    
    <!-- Door -->
    <rect x="270" y="420" width="60" height="80" fill="#E5E7EB"/>
    
    <!-- Decorative Elements -->
    <circle cx="150" cy="150" r="20" fill="#6B7280" opacity="0.2"/>
    <circle cx="450" cy="200" r="15" fill="#6B7280" opacity="0.2"/>
    <circle cx="200" cy="100" r="10" fill="#6B7280" opacity="0.2"/>
    <circle cx="400" cy="150" r="25" fill="#6B7280" opacity="0.2"/>
    
    <!-- Abstract Lines -->
    <path d="M50 450 L150 450" stroke="#6B7280" stroke-width="2" opacity="0.3"/>
    <path d="M450 450 L550 450" stroke="#6B7280" stroke-width="2" opacity="0.3"/>
</svg>
